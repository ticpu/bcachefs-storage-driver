# Shadows /usr/share/containers/storage.conf.d/00-storage-arch.conf, which sets
# driver = "overlay". Since storage 1.63 drop-ins are parsed after the main
# config, so that vendor file overrides driver = "bcachefs" in
# /etc/containers/storage.conf and a fresh graphroot silently comes up overlay.
# Drop-ins are de-duplicated by basename with /etc outranking /usr/share, so
# reusing the name replaces it rather than merging with it.
#
# Priority, not override: no driver key here, so an explicit driver in
# storage.conf still wins. With none set, bcachefs is tried first and overlay
# picked when the graphroot is not bcachefs.

[storage]
driver_priority = ["bcachefs", "overlay"]
